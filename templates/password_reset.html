{% extends "layout.html" %}

{% block title %}
Password Reset
{% endblock %}

{% block main %}
<p>Enter your e-mail address and we will send you a password reset link.</p>
<form action="/password_reset" method="post">
    <div class="mb-3">
        <input autocomplete="off" autofocus class="form-control mx-auto w-auto" id="e-mail" name="e-mail"
            placeholder="E-mail" type="email">
    </div>
    <button class="btn btn-primary" type="submit">Request password reset</button>
</form>
{% endblock %}
